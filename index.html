<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RFM 客戶關係管理 — 十四堂課漫畫劇本</title>
<style>
  :root {
    --primary: #1a365d;
    --accent: #c4a35a;
    --bg: #f5f0e8;
    --card: #fffef9;
    --text: #2d2a24;
    --muted: #8b8276;
    --border: #ddd6c8;
    --sidebar-bg: #1e1b16;
    --sidebar-text: #b8b0a0;
    --sidebar-active: #2d2820;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: -apple-system, 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a365d 0%, #2d4a7a 100%);
    color: #e8dcc8;
    padding: 0 12px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
  .header .badge { font-size: 10px; opacity: 0.7; display: none; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    background: #fffef9;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .toolbar button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text);
    flex-shrink: 0;
  }
  .toolbar button:active { background: #e8e0d3; }
  .toolbar button.active { background: var(--primary); color: #e8dcc8; border-color: var(--primary); }
  .toolbar .sep { color: #ccc; margin: 0 2px; flex-shrink: 0; }
  .toolbar .info { font-size: 11px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
  .toolbar .nav-btns { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
  .toolbar .nav-btns button { padding: 6px 10px; font-size: 16px; min-width: 36px; }
  .toolbar .nav-btns button:disabled { opacity: 0.25; }

  /* ── Layout ── */
  .main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* ── Sidebar ── */
  .sidebar { display: none; }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8px;
    background: radial-gradient(ellipse at center, #f7f3e9 0%, #e8e0d3 100%);
    min-height: 0;
  }

  /* ── Cover ── */
  .cover-wrap {
    text-align: center;
    max-width: 420px;
    width: 100%;
    padding: 16px 0;
  }
  .cover-wrap img { width: 100%; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 16px; }
  .cover-wrap h2 { font-size: 20px; color: var(--primary); margin-bottom: 4px; }
  .cover-wrap p { font-size: 13px; color: var(--muted); margin-bottom: 16px; padding: 0 8px; }
  .cover-wrap .btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #e8dcc8; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--border); }

  /* ── Scene viewer ── */
  .scene-wrap {
    width: 100%;
    max-width: 100%;
  }
  .scene-card {
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .scene-card .img-area {
    position: relative;
    cursor: pointer;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene-card .img-area img {
    display: block;
    width: 100%;
    height: auto;
  }
  .scene-card .caption {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .scene-card .caption h3 { font-size: 14px; color: var(--primary); margin-bottom: 2px; }
  .scene-card .caption p { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .scene-card .caption .pg { font-size: 10px; color: #c4b998; margin-top: 4px; }

  /* Touch nav buttons overlaid on image */
  .touch-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    color: #fff;
    border: none;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .touch-nav:active { background: rgba(0,0,0,0.7); }
  .touch-nav:disabled { opacity: 0.15; }
  .touch-nav.prev { left: 8px; }
  .touch-nav.next { right: 8px; }

  /* Bottom scene nav */
  .scene-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    gap: 8px;
  }
  .scene-nav button {
    font-family: inherit;
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    background: #fff;
    border: 1px solid var(--border);
    touch-action: manipulation;
    flex: 1;
    max-width: 120px;
  }
  .scene-nav button:active { background: #f5f0e8; }
  .scene-nav button:disabled { opacity: 0.25; }
  .scene-nav .pg-indicator { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ── Grid gallery ── */
  .gallery-wrap { width: 100%; max-width: 100%; }
  .gallery-wrap h2 { font-size: 16px; color: var(--primary); margin-bottom: 12px; padding: 0 4px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .gallery-card {
    background: var(--card);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    cursor: pointer;
    border: none;
    text-align: left;
    font-family: inherit;
    touch-action: manipulation;
  }
  .gallery-card:active { opacity: 0.8; }
  .gallery-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .gallery-card .info { padding: 8px 10px; }
  .gallery-card .info h4 { font-size: 12px; color: var(--text); margin-bottom: 2px; }
  .gallery-card .info p { font-size: 10px; color: var(--muted); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* ── Mobile thumb strip ── */
  .mobile-strip {
    display: flex;
    border-top: 1px solid var(--border);
    background: #fff;
    padding: 6px;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-shrink: 0;
  }
  .mobile-strip button {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    background: none;
    touch-action: manipulation;
  }
  .mobile-strip button:active { opacity: 0.7; }
  .mobile-strip button.current { border-color: var(--accent); }
  .mobile-strip button img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.95);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .lightbox img { max-width: 100%; max-height: 90vh; max-height: 90dvh; object-fit: contain; }
  .lightbox .close {
    position: absolute; top: 12px; right: 16px;
    font-size: 28px; color: #fff; cursor: pointer;
    background: none; border: none;
    z-index: 2;
    padding: 8px;
    touch-action: manipulation;
  }
  .lightbox .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .lightbox .lb-nav.prev { left: 8px; }
  .lightbox .lb-nav.next { right: 8px; }

  /* ── Desktop ── */
  @media (min-width: 769px) {
    .header { padding: 0 24px; height: 52px; }
    .header h1 { font-size: 16px; }
    .header .badge { display: inline; }
    .sidebar {
      display: block;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      width: 200px;
      flex-shrink: 0;
      overflow-y: auto;
      font-size: 13px;
    }
    .sidebar-section {
      padding: 12px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #6b6355;
    }
    .sidebar button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 8px 16px 8px 14px;
      font-size: 13px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      font-family: inherit;
    }
    .sidebar button:hover { background: rgba(255,255,255,0.04); color: #ddd6c1; }
    .sidebar button.active { background: var(--sidebar-active); color: #d4b96a; border-left-color: #d4b96a; }
    .sidebar button .sub { font-size: 10px; opacity: 0.5; display: block; margin-top: 1px; }
    .content { padding: 16px 24px; align-items: center; }
    .toolbar { gap: 8px; padding: 8px 16px; }
    .toolbar button { font-size: 12px; padding: 5px 12px; }
    .toolbar button:hover { background: #f5f0e8; }
    .toolbar button.active:hover { background: var(--primary); }
    .toolbar .info { font-size: 12px; }
    .toolbar .nav-btns button { font-size: 14px; }
    .toolbar .nav-btns button:disabled { opacity: 0.25; cursor: default; }
    .cover-wrap { padding: 0; }
    .cover-wrap h2 { font-size: 22px; }
    .cover-wrap p { font-size: 14px; padding: 0; }
    .cover-wrap img { box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .scene-wrap { max-width: 900px; }
    .gallery-wrap { max-width: 900px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .gallery-card img { height: 180px; }
    .gallery-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .gallery-card .info h4 { font-size: 13px; }
    .gallery-card .info p { font-size: 11px; }
    .touch-nav { display: none; }
    .mobile-strip { display: none; }
    .content { overflow-y: auto; }
    .scene-nav button { max-width: none; flex: 0; }
  }

  /* Desktop hover nav (replaces touch-nav) */
  @media (min-width: 769px) {
    .scene-card .img-area .hover-nav {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; opacity: 0; transition: opacity 0.2s;
    }
    .scene-card .img-area:hover .hover-nav { opacity: 1; }
    .scene-card .img-area .hover-nav button {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .scene-card .img-area .hover-nav button:disabled { opacity: 0.15; cursor: default; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4b998; border-radius: 2px; }
</style>
</head>

    { id:11, title:"第十一課", sub:"放下的智慧", scenes:[
      { title:"Lost 客戶講解", desc:"莫教授平靜地談論客戶流失的自然規律", img:"images/第十一課-1：Lost客戶講解.png" },
      { title:"落葉歸根比喻", desc:"秋葉飄落——有些客戶的離去是自然循環的一部分", img:"images/第十一課-2：落葉歸根比喻.png" },
      { title:"放下與珍惜", desc:"學會放下無法挽回的，把心力放在值得珍惜的關係上", img:"images/第十一課-3：放下與珍惜.png" },
    ]},
    { id:12, title:"第十二課", sub:"完整的視野", scenes:[
      { title:"完整 RFM 地圖", desc:"莫教授展開一幅完整的 RFM 策略地圖", img:"images/第十二課-1：完整RFM地圖.png" },
      { title:"策略制定教學", desc:"手把手教小林如何根據不同分群制定差異化策略", img:"images/第十二課-2：策略制定教學.png" },
      { title:"完整思維建立", desc:"小林終於建立起完整的 RFM 策略思維框架", img:"images/第十二課-3：完整思維建立.png" },
    ]},
    { id:13, title:"第十三課", sub:"人生的映射", scenes:[
      { title:"RFM 人生應用", desc:"莫教授闔上課本，開始談論人生", img:"images/第十三課-1：RFM人生應用.png" },
      { title:"人際關係的 RFM", desc:"人與人之間的關係也可以用 RFM 來理解", img:"images/第十三課-2：人際關係的RFM.png" },
      { title:"師生傳承時刻", desc:"最深刻的教學不是知識的傳遞，而是智慧的傳承", img:"images/第十三課-3：師生傳承時刻.png" },
    ]},
    { id:14, title:"第十四課", sub:"夕陽下的離別", scenes:[
      { title:"最後一堂課開場", desc:"書房的氣氛與第一堂課不同，多了幾分不捨", img:"images/第十四課-1：最後一堂課開場.png" },
      { title:"十四堂課精華總結", desc:"莫教授將十四堂課的精華濃縮成一段話", img:"images/第十四課-2：十四堂課精華總結.png" },
      { title:"夕陽離別", desc:"夕陽西下，小林的學習旅程告一段落，但 RFM 的智慧將伴隨他一生", img:"images/第十四課-3：夕陽離別.png" },
    ]},
  ],
  epilogue: [
    { title:"傳承繼續", desc:"小林將所學應用在工作中，RFM 的智慧繼續傳承下去", img:"images/尾聲-1：傳承繼續.png" },
    { title:"書房空景", desc:"書房恢復寧靜，夕陽依舊溫暖，等待下一位學生的到來", img:"images/尾聲-2：書房空景.png" },
  ],
};

let mode = 'cover';
let lessonIdx = 0;
let sceneIdx = 0;
let touchStartX = 0;
let touchStartY = 0;
let lightboxItems = null;
let lightboxIdx = 0;

const app = document.getElementById('app');

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'style') Object.assign(el.style, v);
      else if (k === 'disabled' && !v) {}
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function render() {
  app.innerHTML = '';
  const lesson = COMIC.lessons[lessonIdx];
  const scenes = lesson ? lesson.scenes : [];
  const isDesktop = window.innerWidth >= 769;

  const header = h('div', {className:'header'},
    h('h1', {}, 'RFM 漫畫劇本'),
    h('span', {className:'badge'}, '十四堂客戶關係管理課'),
  );

  const tb = h('div', {className:'toolbar'});
  tb.appendChild(btn('封面', () => setMode('cover'), mode === 'cover'));
  if (mode !== 'cover' || isDesktop) {
    tb.appendChild(btn('角色', () => setMode('characters'), mode === 'characters'));
    tb.appendChild(btn('場景', () => setMode('references'), mode === 'references'));
  }
  if (mode === 'lesson') {
    tb.appendChild(h('span', {className:'sep'}, '|'));
    tb.appendChild(h('span', {className:'info'}, lesson.title));
    tb.appendChild(h('span', {className:'info'}, `${sceneIdx + 1}/${scenes.length}`));
    const nav = h('div', {className:'nav-btns'});
    nav.appendChild(btn('◀', prevScene, !hasPrev(), true));
    nav.appendChild(btn('▶', nextScene, !hasNext(), true));
    tb.appendChild(nav);
  }

  const sidebar = h('div', {className:'sidebar'});
  if (isDesktop) {
    sidebar.appendChild(h('div', {className:'sidebar-section'}, '課程列表'));
    COMIC.lessons.forEach((l, i) => {
      const b = h('button', {onClick: () => openLesson(i)},
        h('span', {}, l.title),
        h('span', {className:'sub'}, l.sub),
      );
      if (mode === 'lesson' && lessonIdx === i) b.className = 'active';
      sidebar.appendChild(b);
    });
    sidebar.appendChild(h('div', {className:'sidebar-section'}, '尾聲'));
    const epBtn = h('button', {onClick: () => setMode('epilogue')}, '尾聲');
    if (mode === 'epilogue') epBtn.className = 'active';
    sidebar.appendChild(epBtn);
  }

  const content = h('div', {className:'content'});
  if (mode === 'cover') content.appendChild(renderCover());
  else if (mode === 'characters') content.appendChild(renderGallery('角色介紹', COMIC.characters));
  else if (mode === 'references') content.appendChild(renderGallery('場景參考', COMIC.references));
  else if (mode === 'lesson') content.appendChild(renderScene(scenes[sceneIdx], sceneIdx, scenes.length));
  else if (mode === 'epilogue') content.appendChild(renderGallery('尾聲', COMIC.epilogue));

  // Mobile: lesson list as a scrollable strip above thumbnails
  let lessonStrip = null;
  if (!isDesktop && mode === 'lesson') {
    lessonStrip = h('div', {className:'mobile-strip', style:{borderBottom:'none'}});
    COMIC.lessons.forEach((l, i) => {
      const b = h('button', {
        onClick: () => { lessonIdx = i; sceneIdx = 0; render(); },
        style: {
          flexShrink: '0', padding: '4px 10px', borderRadius: '12px',
          border: i === lessonIdx ? '1px solid var(--accent)' : '1px solid var(--border)',
          background: i === lessonIdx ? 'var(--primary)' : '#fff',
          color: i === lessonIdx ? '#e8dcc8' : 'var(--text)',
          fontSize: '11px', fontFamily: 'inherit', whiteSpace: 'nowrap',
          width: 'auto', height: 'auto', cursor: 'pointer'
        }
      }, l.title);
      lessonStrip.appendChild(b);
    });
  }

  // Thumb strip
  const strip = h('div', {className:'mobile-strip'});
  if (mode === 'lesson') {
    scenes.forEach((s, i) => {
      const b = h('button', {onClick: () => { sceneIdx = i; render(); }},
        h('img', {src:s.img, alt:s.title}),
      );
      if (i === sceneIdx) b.className = 'current';
      strip.appendChild(b);
    });
  }

  app.appendChild(header);
  app.appendChild(tb);
  app.appendChild(h('div', {className:'main-layout'}, sidebar, content));
  if (lessonStrip) app.appendChild(lessonStrip);
  app.appendChild(strip);

  // Attach swipe to content area
  if (mode === 'lesson') {
    const contentEl = app.querySelector('.content');
    if (contentEl) {
      contentEl.addEventListener('touchstart', handleTouchStart, {passive: true});
      contentEl.addEventListener('touchend', handleTouchEnd, {passive: false});
    }
  }
}

function btn(label, onClick, disabled, small) {
  return h('button', {onClick, disabled: disabled || false, className: small ? '' : ''}, label);
}

function setMode(m) {
  mode = m;
  sceneIdx = 0;
  render();
}

function openLesson(i) {
  lessonIdx = i;
  sceneIdx = 0;
  mode = 'lesson';
  render();
}

function prevScene() {
  if (sceneIdx > 0) {
    sceneIdx--; render();
  } else if (lessonIdx > 0) {
    lessonIdx--;
    sceneIdx = COMIC.lessons[lessonIdx].scenes.length - 1;
    render();
  }
}

function nextScene() {
  const lesson = COMIC.lessons[lessonIdx];
  const max = lesson ? lesson.scenes.length : 0;
  if (sceneIdx < max - 1) {
    sceneIdx++; render();
  } else if (lessonIdx < COMIC.lessons.length - 1) {
    lessonIdx++;
    sceneIdx = 0;
    render();
  }
}

function hasNext() {
  const lesson = COMIC.lessons[lessonIdx];
  if (!lesson) return false;
  if (sceneIdx < lesson.scenes.length - 1) return true;
  return lessonIdx < COMIC.lessons.length - 1;
}

function hasPrev() {
  if (sceneIdx > 0) return true;
  return lessonIdx > 0;
}

function openLightbox(src, items, idx) {
  lightboxItems = items;
  lightboxIdx = idx;
  showLightbox(src);
}

function showLightbox(src) {
  // Remove existing
  const old = document.querySelector('.lightbox');
  if (old) old.remove();

  const lb = h('div', {className:'lightbox', onClick: (e) => { if (e.target === lb) lb.remove(); }},
    h('button', {className:'close', onClick: () => lb.remove()}, '✕'),
    h('img', {src, onClick: (e) => e.stopPropagation()}),
  );

  if (lightboxItems && lightboxItems.length > 1) {
    const prev = h('button', {
      className: 'lb-nav prev',
      onClick: (e) => {
        e.stopPropagation();
        if (lightboxIdx > 0) {
          lightboxIdx--;
          const s = lightboxItems[lightboxIdx];
          showLightbox(s.img || s.image);
        }
      },
      disabled: lightboxIdx === 0
    }, '‹');
    const next = h('button', {
      className: 'lb-nav next',
      onClick: (e) => {
        e.stopPropagation();
        if (lightboxIdx < lightboxItems.length - 1) {
          lightboxIdx++;
          const s = lightboxItems[lightboxIdx];
          showLightbox(s.img || s.image);
        }
      },
      disabled: lightboxIdx >= lightboxItems.length - 1
    }, '›');
    lb.appendChild(prev);
    lb.appendChild(next);
  }

  document.body.appendChild(lb);
}

// Swipe detection
function handleTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}

function handleTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextScene();
    else prevScene();
    e.preventDefault();
  }
}

function renderCover() {
  return h('div', {className:'cover-wrap'},
    h('img', {src: COMIC.cover.img, alt: COMIC.cover.title}),
    h('h2', {}, COMIC.cover.title),
    h('p', {}, COMIC.cover.sub),
    h('div', {className:'btns'},
      h('button', {className:'btn btn-primary', onClick: () => openLesson(0)}, '開始閱讀'),
      h('button', {className:'btn btn-outline', onClick: () => setMode('characters')}, '角色介紹'),
    ),
  );
}

function renderScene(scene, idx, total) {
  const isDesktop = window.innerWidth >= 769;
  const lesson = COMIC.lessons[lessonIdx];
  const allScenes = lesson ? lesson.scenes : [];

  return h('div', {className:'scene-wrap'},
    h('div', {className:'scene-card'},
      h('div', {className:'img-area', onClick: () => openLightbox(scene.img, allScenes, idx)},
        h('img', {src: scene.img, alt: scene.title}),
        // Touch nav buttons (mobile only)
        ...(isDesktop ? [] : [
          h('button', {className:'touch-nav prev', onClick: (e) => { e.stopPropagation(); prevScene(); }, disabled: !hasPrev()}, '‹'),
          h('button', {className:'touch-nav next', onClick: (e) => { e.stopPropagation(); nextScene(); }, disabled: !hasNext()}, '›'),
        ]),
        // Hover nav (desktop only)
        ...(isDesktop ? [
          h('div', {className:'hover-nav'},
            h('button', {onClick: (e) => { e.stopPropagation(); prevScene(); }, disabled: !hasPrev()}, '‹'),
            h('button', {onClick: (e) => { e.stopPropagation(); nextScene(); }, disabled: !hasNext()}, '›'),
          ),
        ] : []),
      ),
      h('div', {className:'caption'},
        h('h3', {}, scene.title),
        h('p', {}, scene.desc),
        h('div', {className:'pg'}, `${idx + 1} / ${total}`),
      ),
    ),
    (() => {
      const atLast = idx >= total - 1;
      const nextLesson = atLast && lessonIdx < COMIC.lessons.length - 1 ? COMIC.lessons[lessonIdx + 1] : null;
      const nextLabel = nextLesson ? `下一課 ›` : '下一頁 →';
      const prevLesson = idx === 0 && lessonIdx > 0 ? COMIC.lessons[lessonIdx - 1] : null;
      const prevLabel = prevLesson ? `‹ 上一課` : '← 上一頁';
      return h('div', {className:'scene-nav'},
        h('button', {onClick: prevScene, disabled: !hasPrev(), title: prevLesson ? prevLesson.title : ''}, prevLabel),
        h('span', {className:'pg-indicator'}, nextLesson ? `${lessonIdx + 1}/${COMIC.lessons.length} 課` : `${idx + 1} / ${total}`),
        h('button', {onClick: nextScene, disabled: !hasNext(), title: nextLesson ? nextLesson.title : ''}, nextLabel),
      );
    })(),
  );
}

function renderGallery(title, items) {
  return h('div', {className:'gallery-wrap'},
    h('h2', {}, title),
    h('div', {className:'gallery-grid'},
      ...items.map((item, i) => h('button', {
        className:'gallery-card',
        onClick: () => showDetail(title, items, i)
      },
        h('img', {src: item.img, alt: item.title}),
        h('div', {className:'info'},
          h('h4', {}, item.title),
          h('p', {}, item.desc),
        ),
      )),
    ),
  );
}

function showDetail(title, items, idx) {
  const item = items[idx];
  const wrap = h('div', {className:'scene-wrap'},
    h('button', {className:'btn btn-outline', onClick: render, style:{marginBottom:'10px', display:'inline-block'}}, `← 返回${title}`),
    h('div', {className:'scene-card'},
      h('div', {className:'img-area', onClick: () => openLightbox(item.img, items, idx)},
        h('img', {src: item.img, alt: item.title}),
      ),
      h('div', {className:'caption'},
        h('h3', {}, item.title),
        h('p', {}, item.desc),
      ),
    ),
  );
  const contentEl = app.querySelector('.content');
  if (contentEl) { contentEl.innerHTML = ''; contentEl.appendChild(wrap); }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { if (mode === 'lesson') prevScene(); }
  if (e.key === 'ArrowRight') { if (mode === 'lesson') nextScene(); }
  if (e.key === 'Escape') {
    const lb = document.querySelector('.lightbox');
    if (lb) lb.remove();
  }
});

render();
</script>
</body>
</html>
