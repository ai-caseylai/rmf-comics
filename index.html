<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFM 客戶關係管理 — 十四堂課漫畫劇本</title>
<style>
  :root {
    --primary: #1a365d;
    --accent: #c4a35a;
    --bg: #f5f0e8;
    --card: #fffef9;
    --text: #2d2a24;
    --muted: #8b8276;
    --border: #ddd6c8;
    --sidebar-bg: #1e1b16;
    --sidebar-text: #b8b0a0;
    --sidebar-active: #2d2820;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Serif TC', 'Noto Sans TC', 'Songti TC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a365d 0%, #2d4a7a 100%);
    color: #e8dcc8;
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    z-index: 10;
  }
  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .header .badge { font-size: 11px; opacity: 0.7; letter-spacing: 0.5px; }

  /* ── Layout ── */
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    width: 200px;
    flex-shrink: 0;
    overflow-y: auto;
    font-size: 13px;
  }
  .sidebar-section {
    padding: 12px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #6b6355;
  }
  .sidebar button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    padding: 8px 16px 8px 14px;
    font-size: 13px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
  }
  .sidebar button:hover { background: rgba(255,255,255,0.04); color: #ddd6c1; }
  .sidebar button.active { background: var(--sidebar-active); color: #d4b96a; border-left-color: #d4b96a; }
  .sidebar button .sub { font-size: 10px; opacity: 0.5; display: block; margin-top: 1px; }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px;
    background: radial-gradient(ellipse at center, #f7f3e9 0%, #e8e0d3 100%);
    min-height: 0;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #fffef9;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .toolbar button {
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .toolbar button:hover { background: #f5f0e8; }
  .toolbar button.active { background: var(--primary); color: #e8dcc8; border-color: var(--primary); }
  .toolbar .sep { color: #ccc; margin: 0 2px; }
  .toolbar .info { font-size: 12px; color: var(--muted); }
  .toolbar .nav-btns { display: flex; gap: 4px; margin-left: auto; }
  .toolbar .nav-btns button { padding: 5px 8px; font-size: 14px; }
  .toolbar .nav-btns button:disabled { opacity: 0.25; cursor: default; }

  /* ── Cover ── */
  .cover-wrap { text-align: center; max-width: 480px; }
  .cover-wrap img { width: 100%; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); margin-bottom: 20px; }
  .cover-wrap h2 { font-size: 22px; color: var(--primary); margin-bottom: 6px; }
  .cover-wrap p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .cover-wrap .btns { display: flex; gap: 10px; justify-content: center; }
  .btn {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary { background: var(--primary); color: #e8dcc8; }
  .btn-primary:hover { background: #2d4a7a; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--border); }
  .btn-outline:hover { background: #f5f0e8; }

  /* ── Scene viewer ── */
  .scene-wrap {
    max-width: 900px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .scene-card {
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }
  .scene-card .img-area {
    position: relative;
    cursor: pointer;
    background: #1a1a1a;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .scene-card .img-area img {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }
  .scene-card .img-area .hover-nav {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px; opacity: 0; transition: opacity 0.2s;
  }
  .scene-card .img-area:hover .hover-nav { opacity: 1; }
  .scene-card .img-area .hover-nav button {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .scene-card .img-area .hover-nav button:disabled { opacity: 0.15; cursor: default; }
  .scene-card .caption {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .scene-card .caption h3 { font-size: 14px; color: var(--primary); margin-bottom: 2px; }
  .scene-card .caption p { font-size: 12px; color: var(--muted); }
  .scene-card .caption .pg { font-size: 10px; color: #c4b998; margin-top: 4px; }
  .scene-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    flex-shrink: 0;
  }
  .scene-nav button {
    font-family: inherit;
    padding: 6px 16px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .scene-nav button:hover:not(:disabled) { background: #f5f0e8; }
  .scene-nav button:disabled { opacity: 0.25; cursor: default; }
  .scene-nav .pg-indicator { font-size: 11px; color: var(--muted); align-self: center; }

  /* ── Grid gallery ── */
  .gallery-wrap { max-width: 900px; width: 100%; }
  .gallery-wrap h2 { font-size: 18px; color: var(--primary); margin-bottom: 16px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .gallery-card {
    background: var(--card);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    text-align: left;
    font-family: inherit;
  }
  .gallery-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-2px); }
  .gallery-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .gallery-card .info { padding: 12px 14px; }
  .gallery-card .info h4 { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .gallery-card .info p { font-size: 11px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; }
  .lightbox .close {
    position: absolute; top: 16px; right: 20px;
    font-size: 28px; color: #fff; cursor: pointer; background: none; border: none;
  }

  /* ── Mobile thumb strip ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .content { padding: 12px; }
    .cover-wrap h2 { font-size: 18px; }
  }
  .mobile-strip {
    display: none;
    border-top: 1px solid var(--border);
    background: #fff;
    padding: 8px;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  @media (max-width: 768px) {
    .mobile-strip { display: flex; }
  }
  .mobile-strip button {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    background: none;
  }
  .mobile-strip button.current { border-color: var(--accent); }
  .mobile-strip button img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4b998; border-radius: 3px; }
</style>
</head>

    ]},
    { id:14, title:"第十四課", sub:"夕陽下的離別", concept:"總結 — 十四堂課的精華，以及一段關係的完結", scenes:[
      { title:"最後一堂課開場", desc:"書房的氣氛與第一堂課不同，多了幾分不捨", img:"images/第十四課-1：最後一堂課開場.png" },
      { title:"十四堂課精華總結", desc:"莫教授將十四堂課的精華濃縮成一段話", img:"images/第十四課-2：十四堂課精華總結.png" },
      { title:"夕陽離別", desc:"夕陽西下，小林的學習旅程告一段落，但 RFM 的智慧將伴隨他一生", img:"images/第十四課-3：夕陽離別.png" },
    ]},
  ],
  epilogue: [
    { title:"傳承繼續", desc:"小林將所學應用在工作中，RFM 的智慧繼續傳承下去", img:"images/尾聲-1：傳承繼續.png" },
    { title:"書房空景", desc:"書房恢復寧靜，夕陽依舊溫暖，等待下一位學生的到來", img:"images/尾聲-2：書房空景.png" },
  ],
};

// ── State ──
let mode = 'cover'; // cover | characters | references | lesson | epilogue
let lessonIdx = 0;
let sceneIdx = 0;

// ── Render ──
const app = document.getElementById('app');

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'style') Object.assign(el.style, v);
      else if (k === 'disabled' && !v) {}
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function render() {
  app.innerHTML = '';
  const lesson = COMIC.lessons[lessonIdx];
  const scenes = lesson ? lesson.scenes : [];

  // Header
  const header = h('div', {className:'header'},
    h('h1', {}, 'RFM 漫畫劇本'),
    h('span', {className:'badge'}, '十四堂客戶關係管理課'),
  );

  // Toolbar
  const tb = h('div', {className:'toolbar'});
  tb.appendChild(btn('封面', () => setMode('cover'), mode === 'cover'));
  tb.appendChild(btn('角色介紹', () => setMode('characters'), mode === 'characters'));
  tb.appendChild(btn('場景參考', () => setMode('references'), mode === 'references'));
  if (mode === 'lesson') {
    tb.appendChild(h('span', {className:'sep'}, '|'));
    tb.appendChild(h('span', {className:'info'}, `${lesson.title} · ${lesson.sub}`));
    tb.appendChild(h('span', {className:'info'}, `${sceneIdx + 1} / ${scenes.length}`));
    const nav = h('div', {className:'nav-btns'});
    nav.appendChild(btn('◀', prevScene, sceneIdx === 0, true));
    nav.appendChild(btn('▶', nextScene, sceneIdx >= scenes.length - 1, true));
    nav.appendChild(btn('🔍', () => openLightbox(scenes[sceneIdx].img), false, true));
    tb.appendChild(nav);
  }

  // Sidebar
  const sidebar = h('div', {className:'sidebar'});
  sidebar.appendChild(h('div', {className:'sidebar-section'}, '課程列表'));
  COMIC.lessons.forEach((l, i) => {
    const b = h('button', {onClick: () => openLesson(i)},
      h('span', {}, l.title),
      h('span', {className:'sub'}, l.sub),
    );
    if (mode === 'lesson' && lessonIdx === i) b.className = 'active';
    sidebar.appendChild(b);
  });
  sidebar.appendChild(h('div', {className:'sidebar-section'}, '尾聲'));
  const epBtn = h('button', {onClick: () => setMode('epilogue')}, '尾聲');
  if (mode === 'epilogue') epBtn.className = 'active';
  sidebar.appendChild(epBtn);

  // Content
  const content = h('div', {className:'content'});
  if (mode === 'cover') content.appendChild(renderCover());
  else if (mode === 'characters') content.appendChild(renderGallery('角色介紹', COMIC.characters));
  else if (mode === 'references') content.appendChild(renderGallery('場景參考', COMIC.references));
  else if (mode === 'lesson') content.appendChild(renderScene(scenes[sceneIdx], sceneIdx, scenes.length));
  else if (mode === 'epilogue') content.appendChild(renderGallery('尾聲', COMIC.epilogue));

  // Mobile strip
  const strip = h('div', {className:'mobile-strip'});
  if (mode === 'lesson') {
    scenes.forEach((s, i) => {
      const b = h('button', {onClick: () => { sceneIdx = i; render(); }},
        h('img', {src:s.img, alt:s.title}),
      );
      if (i === sceneIdx) b.className = 'current';
      strip.appendChild(b);
    });
  }

  app.appendChild(header);
  app.appendChild(tb);
  app.appendChild(h('div', {className:'main-layout'}, sidebar, content));
  app.appendChild(strip);
}

function btn(label, onClick, disabled, small) {
  return h('button', {onClick, disabled: disabled || false, className: small ? '' : ''}, label);
}

function setMode(m) {
  mode = m;
  sceneIdx = 0;
  render();
}

function openLesson(i) {
  lessonIdx = i;
  sceneIdx = 0;
  mode = 'lesson';
  render();
}

function prevScene() {
  if (sceneIdx > 0) { sceneIdx--; render(); }
}

function nextScene() {
  const max = COMIC.lessons[lessonIdx].scenes.length;
  if (sceneIdx < max - 1) { sceneIdx++; render(); }
}

function openLightbox(src) {
  const lb = h('div', {className:'lightbox', onClick: (e) => { if (e.target === lb) lb.remove(); }},
    h('button', {className:'close', onClick: () => lb.remove()}, '✕'),
    h('img', {src}),
  );
  document.body.appendChild(lb);
}

// ── View renders ──
function renderCover() {
  return h('div', {className:'cover-wrap'},
    h('img', {src: COMIC.cover.img, alt: COMIC.cover.title}),
    h('h2', {}, COMIC.cover.title),
    h('p', {}, COMIC.cover.sub),
    h('div', {className:'btns'},
      h('button', {className:'btn btn-primary', onClick: () => openLesson(0)}, '開始閱讀'),
      h('button', {className:'btn btn-outline', onClick: () => setMode('characters')}, '角色介紹'),
    ),
  );
}

function renderScene(scene, idx, total) {
  return h('div', {className:'scene-wrap'},
    h('div', {className:'scene-card'},
      h('div', {className:'img-area', onClick: () => openLightbox(scene.img)},
        h('img', {src: scene.img, alt: scene.title}),
        h('div', {className:'hover-nav'},
          h('button', {onClick: (e) => { e.stopPropagation(); prevScene(); }, disabled: idx === 0}, '‹'),
          h('button', {onClick: (e) => { e.stopPropagation(); nextScene(); }, disabled: idx >= total - 1}, '›'),
        ),
      ),
      h('div', {className:'caption'},
        h('h3', {}, scene.title),
        h('p', {}, scene.desc),
        h('div', {className:'pg'}, `${idx + 1} / ${total}`),
      ),
    ),
    h('div', {className:'scene-nav'},
      h('button', {onClick: prevScene, disabled: idx === 0}, '← 上一頁'),
      h('span', {className:'pg-indicator'}, `${idx + 1} / ${total}`),
      h('button', {onClick: nextScene, disabled: idx >= total - 1}, '下一頁 →'),
    ),
  );
}

function renderGallery(title, items) {
  return h('div', {className:'gallery-wrap'},
    h('h2', {}, title),
    h('div', {className:'gallery-grid'},
      ...items.map((item, i) => h('button', {className:'gallery-card', onClick: () => showDetail(title, items, i)},
        h('img', {src: item.img, alt: item.title}),
        h('div', {className:'info'},
          h('h4', {}, item.title),
          h('p', {}, item.desc),
        ),
      )),
    ),
  );
}

function showDetail(title, items, idx) {
  const item = items[idx];
  const wrap = h('div', {className:'scene-wrap'},
    h('button', {className:'btn btn-outline', onClick: render, style:{marginBottom:'12px'}}, `← 返回${title}`),
    h('div', {className:'scene-card'},
      h('div', {className:'img-area', onClick: () => openLightbox(item.img)},
        h('img', {src: item.img, alt: item.title}),
      ),
      h('div', {className:'caption'},
        h('h3', {}, item.title),
        h('p', {}, item.desc),
      ),
    ),
  );
  const content = app.querySelector('.content');
  content.innerHTML = '';
  content.appendChild(wrap);
}

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { if (mode === 'lesson') prevScene(); }
  if (e.key === 'ArrowRight') { if (mode === 'lesson') nextScene(); }
  if (e.key === 'Escape') {
    const lb = document.querySelector('.lightbox');
    if (lb) lb.remove();
  }
});

// ── Init ──
render();
</script>
</body>
</html>
